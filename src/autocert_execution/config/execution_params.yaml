# Execution node parameters — robot-agnostic
# Override these per robot via launch arguments or parameter files

# MoveIt planning group — must match SRDF
planning_group: arm

# End-effector link — must match URDF
end_effector_link: tool0

# Reference frame for pose goals
reference_frame: base_link

# Planner settings
planner_id: RRTConnect
planning_time: 5.0
planning_attempts: 3

# Trajectory scaling
velocity_scaling: 0.3
acceleration_scaling: 0.3

# Goal tolerances
goal_position_tolerance: 0.001      # 1 mm
goal_orientation_tolerance: 0.01    # ~0.57°
goal_joint_tolerance: 0.001         # ~0.057°

# Workspace safety bounds (meters)
workspace_bounds:
  x: [-1.5, 1.5]
  y: [-1.5, 1.5]
  z: [-0.5, 2.5]