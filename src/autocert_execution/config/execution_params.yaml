# execution_params.yaml
execution_node:
  ros__parameters:

    planning_group:    arm
    end_effector_link: wrist_roll_link
    reference_frame:   link1
    planner_id:        RRTConnect
    planning_time:     5.0
    velocity_scaling:     0.3
    acceleration_scaling: 0.3
    robot_mode:        simulation

    robot_description_kinematics:
      arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.5
        kinematics_solver_attempts: 50
        position_only_ik: true

    planning_scene_monitor_options:
      name: "planning_scene_monitor"
      robot_description: "robot_description"
      joint_state_topic: "/joint_states"
      attached_collision_object_topic: "/moveit_cpp/planning_scene_monitor"
      publish_planning_scene_topic: "/moveit_cpp/publish_planning_scene"
      monitored_planning_scene_topic: "/moveit_cpp/monitored_planning_scene"
      wait_for_initial_state_timeout: 10.0

    planning_pipelines:
      pipeline_names: ["ompl"]
    default_planning_pipeline: ompl

    # Root-level planning params automatically read when arm.plan() is called empty
    plan_request_params:
      planning_attempts: 5
      planning_pipeline: ompl
      planner_id: "RRTConnectkConfigDefault"
      max_velocity_scaling_factor: 0.3
      max_acceleration_scaling_factor: 0.3
      planning_time: 5.0

    ompl:
      planning_plugins:
        - ompl_interface/OMPLPlanner
      request_adapters:
        - default_planning_request_adapters/ResolveConstraintFrames
        - default_planning_request_adapters/CheckStartStateBounds
        - default_planning_request_adapters/CheckStartStateCollision
      response_adapters:
        - default_planning_response_adapters/ValidateSolution
        - default_planning_response_adapters/DisplayMotionPath
      start_state_max_bounds_error: 0.1
      
      planner_configs:
        RRTConnectkConfigDefault:
          type: geometric::RRTConnect
          range: 0.0

      arm:
        default_planner_config: RRTConnectkConfigDefault
        planner_configs:
          - RRTConnectkConfigDefault

    moveit_manage_controllers: true
    trajectory_execution:
      allowed_execution_duration_scaling: 1.2
      allowed_goal_duration_margin: 0.5
      allowed_start_tolerance: 0.01