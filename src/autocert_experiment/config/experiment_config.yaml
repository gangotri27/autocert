# ISO 9283 Experiment Configuration — Robot Agnostic
# All robot-specific values are injected via launch arguments

# ── Pose strategy ─────────────────────────────────────────────────────────
strategy: iso_cube

# ISO Cube parameters
cube_size_mm: 50
cube_center: [0.35, 0.0, 0.35]          # adjust per robot
pose_set: standard                        # standard(5), extended(7), full(27)
fixed_orientation: [0.0, 0.0, 0.0, 1.0]  # quaternion [x,y,z,w]

# ── Robot parameters (OVERRIDE via launch) ────────────────────────────────
# These MUST be set correctly for your robot
planning_group: arm
end_effector_link: tool0
reference_frame: base_link

# ── MoveIt planner settings ───────────────────────────────────────────────
planner_id: RRTConnect
planning_time: 5.0
velocity_scaling: 0.3
acceleration_scaling: 0.3

# ── Experiment parameters ─────────────────────────────────────────────────
repetitions_per_pose: 5                   # ISO 9283 requires 30 for certification
settling_time_s: 2.0
measurement_timeout_s: 30.0