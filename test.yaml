        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.005
    robot_description_semantic: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!--This\
      \ does not replace URDF, and is not an extension of URDF.\n    This is a format\
      \ for representing semantic information about the robot structure.\n    A URDF\
      \ file must exist for this robot as well, where the joints and the links that\
      \ are referenced are defined\n-->\n<robot name=\"open_manipulator_x\">\n   \
      \ <!--GROUPS: Representation of a set of joints and links. This can be useful\
      \ for specifying DOF to plan for, defining arms, end effectors, etc-->\n   \
      \ <!--LINKS: When a link is specified, the parent joint of that link (if it\
      \ exists) is automatically included-->\n    <!--JOINTS: When a joint is specified,\
      \ the child link of that joint (which will always exist) is automatically included-->\n\
      \    <!--CHAINS: When a chain is specified, all the links along the chain (including\
      \ endpoints) are included in the group. Additionally, all the joints that are\
      \ parents to included links are also included. This means that joints along\
      \ the chain and the parent joint of the base link are included in the group-->\n\
      \    <!--SUBGROUPS: Groups can also be formed by referencing to already defined\
      \ group names-->\n    <group name=\"arm\">\n        <joint name=\"joint1\"/>\n\
      \        <joint name=\"joint2\"/>\n        <joint name=\"joint3\"/>\n      \
      \  <joint name=\"joint4\"/>\n        <joint name=\"joint5_roll\"/>\n       \
      \ <joint name=\"end_effector_joint\"/>\n    </group>\n    <group name=\"gripper\"\
      >\n        <joint name=\"gripper_left_joint\"/>\n        <joint name=\"gripper_right_joint\"\
      />\n    </group>\n    <!--GROUP STATES: Purpose: Define a named state for a\
      \ particular group, in terms of joint values. This is useful to define states\
      \ like 'folded arms'-->\n    <group_state name=\"init\" group=\"arm\">\n   \
      \     <joint name=\"joint1\" value=\"0\"/>\n        <joint name=\"joint2\" value=\"\
      0\"/>\n        <joint name=\"joint3\" value=\"0\"/>\n        <joint name=\"\
      joint4\" value=\"0\"/>\n        <joint name=\"joint5_roll\" value=\"0\"/>\n\
      \    </group_state>\n    <group_state name=\"home\" group=\"arm\">\n       \
      \ <joint name=\"joint1\" value=\"0\"/>\n        <joint name=\"joint2\" value=\"\
      -1\"/>\n        <joint name=\"joint3\" value=\"0.7\"/>\n        <joint name=\"\
      joint4\" value=\"0.3\"/>\n        <joint name=\"joint5_roll\" value=\"0\"/>\n\
      \    </group_state>\n    <group_state name=\"open\" group=\"gripper\">\n   \
      \     <joint name=\"gripper_left_joint\" value=\"0.019\"/>\n    </group_state>\n\
      \    <group_state name=\"close\" group=\"gripper\">\n        <joint name=\"\
      gripper_left_joint\" value=\"-0.01\"/>\n    </group_state>\n    <!--END EFFECTOR:\
      \ Purpose: Represent information about an end effector.-->\n    <end_effector\
      \ name=\"end_effector\" parent_link=\"end_effector_link\" group=\"arm\"/>\n\
      \    <!--DISABLE COLLISIONS: By default it is assumed that any link of the robot\
      \ could potentially come into collision with any other link in the robot. This\
      \ tag disables collision checking between a specified pair of links. -->\n \
      \   <disable_collisions link1=\"gripper_left_link\" link2=\"gripper_right_link\"\
      \ reason=\"Never\"/>\n    <disable_collisions link1=\"gripper_left_link\" link2=\"\
      link4\" reason=\"Never\"/>\n    <disable_collisions link1=\"gripper_left_link\"\
      \ link2=\"link5\" reason=\"Never\"/>\n    <disable_collisions link1=\"gripper_left_link\"\
      \ link2=\"wrist_roll_link\" reason=\"Adjacent\"/>\n    <disable_collisions link1=\"\
      gripper_right_link\" link2=\"link4\" reason=\"Never\"/>\n    <disable_collisions\
      \ link1=\"gripper_right_link\" link2=\"link5\" reason=\"Never\"/>\n    <disable_collisions\
      \ link1=\"gripper_right_link\" link2=\"wrist_roll_link\" reason=\"Adjacent\"\
      />\n    <disable_collisions link1=\"link1\" link2=\"link2\" reason=\"Adjacent\"\
      />\n    <disable_collisions link1=\"link1\" link2=\"link3\" reason=\"Never\"\
      />\n    <disable_collisions link1=\"link2\" link2=\"link3\" reason=\"Adjacent\"\
      />\n    <disable_collisions link1=\"link3\" link2=\"link4\" reason=\"Adjacent\"\
      />\n    <disable_collisions link1=\"link4\" link2=\"link5\" reason=\"Adjacent\"\
      />\n    <disable_collisions link1=\"link4\" link2=\"wrist_roll_link\" reason=\"\
      Never\"/>\n    <disable_collisions link1=\"link5\" link2=\"wrist_roll_link\"\
      \ reason=\"Adjacent\"/>\n    <disable_collisions link1=\"wrist_roll_link\" link2=\"\
      end_effector_link\" reason=\"Adjacent\"/>\n</robot>\n"
