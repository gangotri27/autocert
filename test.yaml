        range: 0.0
        type: geometric::EST
      PRM:
        max_nearest_neighbors: 10
        type: geometric::PRM
      RRT:
        goal_bias: 0.05
        type: geometric::RRT
      RRTConnect:
        range: 0.0
        type: geometric::RRTConnect
    planning_pipelines:
      pipeline_names:
      - ompl
    publish_geometry_updates: true
    publish_planning_scene: true
    publish_state_updates: true
    publish_transforms_updates: true
